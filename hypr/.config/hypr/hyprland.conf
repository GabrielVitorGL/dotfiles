# Onboard display config for GPU Passthrough
#env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2

# You have to change this based on your monitor
monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=DP-6,2560x1440@165,1920x0,1
monitor=DP-1,1920x1080@144,4480x0,1

workspace=1,monitor:HDMI-A-1
workspace=2,monitor:DP-6
workspace=3,monitor:DP-1

# Status bar :)
# exec-once=eww open bar
exec-once=waybar

#Notification
exec-once=dunst
# Wallpaper
exec-once=swaybg -o \* -i ~/.config/hypr/wallpapers/night.jpg -m fill

# For screen sharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# For keyboard
exec-once=fcitx5 -D
# For lockscreen
# exec-once=swayidle -w timeout 200 'swaylock-fancy' ->  bug with swayidle

# Start Page
# exec-once=~/.config/hypr/scripts/startpage.sh

# Bluetooth
exec-once=blueman-applet # Make sure you have installed blueman

# Screen Sharing
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=~/.config/hypr/scripts/screensharing.sh

# Other disks support
exec-once = systemctl --user start hyprpolkitagent


# Kwallet for browser sessions
exec-once = /usr/lib/pam_kwallet_init

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store   

# Fix monitors with VM on && restore session
exec-once = ~/.config/hypr/init_session.sh

input {
    kb_layout = br
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 1.0 # for mouse cursor
    force_no_accel = 1
}

# See https://wiki.hyprland.org/Configuring/Keywords/#executing

device {
    name = epic mouse V1
    sensitivity = -0.5
}

# See https://wiki.hyprland.org/Configuring/Variables/

general {
    layout=dwindle

    gaps_in=5
    gaps_out=20
    border_size=2
    col.active_border=0xff5e81ac
    col.inactive_border=0x66333333

    # apply_sens_to_raw=0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)
}

decoration {
    rounding = 18
    inactive_opacity = 0.9

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(a7caffff)
        color_inactive = rgba(00000050)
    }
}

blurls=waybar
blurls=lockscreen

animations {
    enabled=1
    # bezier=overshot,0.05,0.9,0.1,1.1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,popin
    animation=fade,1,10,default
    animation=workspaces,1,6,overshot,slide
    animation=border,1,10,default
}

dwindle {
    #pseudotile=1 # enable pseudotiling on dwindle
    # force_split=2
    force_split=0
}

master {
    new_on_top=true
}

misc {
    disable_hyprland_logo=true
    disable_splash_rendering=true
    mouse_move_enables_dpms=true
}
# sources
source = ~/.config/hypr/keybindings.conf
