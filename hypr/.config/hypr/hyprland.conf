# Float Necessary Windows
windowrule {
  name = windowrule-1
  float = on
  match:class = ^(Rofi)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^(pavucontrol)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^()$
  match:title = ^(Picture in picture)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = ^(brave.*)$
  match:title = ^(Save File)$
}

windowrule {
  name = windowrule-5
  float = on
  match:class = ^(brave.*)$
  match:title = ^(Open File)$
}

windowrule {
  name = windowrule-6
  float = on
  match:class = ^(LibreWolf)$
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-7
  float = on
  match:class = ^(blueman-manager)$
}

windowrule {
  name = windowrule-8
  float = on
  match:class = ^(org.twosheds.iwgtk)$
}

windowrule {
  name = windowrule-9
  float = on
  match:class = ^(blueberry.py)$
}

windowrule {
  name = windowrule-10
  float = on
  match:class = ^(xdg-desktop-portal-gtk)$
}

windowrule {
  name = windowrule-11
  float = on
  match:class = ^(geeqie)$
}


# Fix sharring wuth discord https://wiki.hyprland.org/Useful-Utilities/Screen-Sharing/
windowrule {
  name = windowrule-12
  opacity = 0.0 override
  no_anim = on
  no_initial_focus = on
  max_size = 1 1
  no_blur = on
  match:class = ^(xwaylandvideobridge)$
}


# Increase the opacity
# windowrule {
#   name = windowrule-13
#   opacity = 1
#   thunar = on
#   discord = on
#   vscodium = on
#   obsidian = on
#   ^(code)$ = on
#   tile = on
#   librewolf = on
#   spotify = on
#   neovim = on
# }

windowrule {
  name = nautilus-opacity
  opacity = 0.85
  match:class = ^(org.gnome.Nautilus)$
}

windowrule {
  name = discord-opacity
  opacity = 0.90
  match:class = ^(discord)$
}

windowrule {
  name = vscodium-opacity
  opacity = 0.9
  match:class = ^(codium)$
}

windowrule {
  name = obsidian-opacity
  opacity = 0.88
  match:class = ^(obsidian)$
}

windowrule {
  name = code-opacity
  opacity = 0.8
  match:class = ^(code.*)$
}

windowrule {
  name = spotify-opacity
  opacity = 0.8
  match:class = ^(Spotify)$
}

windowrule {
  name = librewolf-tile
  opacity = 0.95
  match:class = ^(librewolf|LibreWolf)$
}

windowrule {
  name = neovim-tile
  opacity = 0.95
  match:class = ^(neovim)$
}

windowrule {
  name = kitty
  opacity = 0.83
  match:class = ^(kitty)$
}

# Window Rules > Visual Studio Code


#^.*nvim.*$
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow


# fix for steam

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1   

# dark mode

env = GTK_THEME,Adwaita:dark
